<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <meta name="theme-color" content="#3f4652" />
  <title>Conducting Officer</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260313f" />
  <script>document.documentElement.style.colorScheme='only light';document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body>
  <main class="container">
    <a href="/">← Home</a>
    <h1>Conducting Officer</h1>
    <p class="page-description">Create a session and upload your detail sheet in one step.</p>

    <section class="card">
      <h2>Create Session + Upload Sheet</h2>
      <div class="grid">
        <label>Unit
          <input id="unit" type="text" placeholder="e.g. 1 SIR" />
        </label>
        <label>Coy
          <input id="coy" type="text" placeholder="e.g. Alpha" />
        </label>
        <label>Test Date
          <input id="testDate" type="date" />
        </label>
        <label>Session Code
          <input id="sessionCode" type="text" />
        </label>
        <label>Password
          <input id="password" type="password" />
        </label>
        <label>Detail Sheet (.xlsx)
          <input id="detailSheetFile" type="file" accept=".xlsx" />
        </label>
      </div>
      <div class="action-row">
        <button id="downloadTemplateBtn" type="button">Download Template</button>
        <button id="createBtn" type="button">Create Session & Upload</button>
        <button id="clearDetailSheetBtn" type="button">Clear Imported Details</button>
      </div>
      <pre id="importResult" class="hidden"></pre>
    </section>

    <section class="card">
      <h2>Go to Session Dashboard</h2>
      <div class="grid">
        <label>Session Code
          <input id="dashboardSessionCode" type="text" />
        </label>
        <label>Password
          <input id="dashboardPassword" type="password" />
        </label>
        <label>Test Date
          <input id="dashboardTestDate" type="date" />
        </label>
      </div>
      <button id="useRecentBtn" type="button">Use Recent Session</button>
      <button id="goDashboardBtn">Go to Dashboard</button>
    </section>
  </main>
  <script src="/static/uppercase.js?v=20260313f"></script>
  <script src="/static/conducting.js?v=20260313f"></script>
</body>
</html>
